{% extends "base.html" %}
{% load static %}
{% block content %}

{% if messages %}
<ul class="messages">
    {% for message in messages %}
    <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}
{% csrf_token %}
<h1>Welcome to {{ user.username }}</h1>

<form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    <button type="submit" value="register">Register</button>
</form>

<h2>Enter date:</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" value="attendance_by_date">Submit</button>
</form>

{%endblock content%}
