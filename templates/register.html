<html lang="en">

<body>
<h1>Register Page</h1>
<form  method="post">
    {% csrf_token %}
    <h3>Register new Employee</h3><br>
    
{% comment %} {#    <input type="text" placeholder="Full name"><br>#}
{#    <input type="number" name="emp_id" placeholder="Number"><br>#}
{#    <input type="text" name="phone" placeholder="Phone"><br>#}
{#    <input type="text" name="address" placeholder="Address"><br>#}

{#    <input type="submit" value="Register"><br>#}
{#    <input type="reset" value="Clear">#}  {% endcomment %}
<label for="full_name">Full Name:</label>
<input type="text" id="full_name" name="full_name" required><br><br>
<label for="emp_id">Employee ID:</label>
<input type="text" id="emp_id" name="emp_id" required><br><br>
<label for="phone">Phone Number:</label>
<input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required><br><br>
<label for="address">Address:</label>
<textarea id="address" name="address" required></textarea><br><br>
<label for="email">Email:</label>
<input type="email" id="email" name="email" required><br><br>
<label for="username">Username:</label>
<input type="text" id="username" name="username" required><br><br>
<label for="password">Password:</label>
<input type="password" id="password" name="password" required><br><br>
<button type="submit" value="Register">Submit</button>
<input type="reset" value="Clear">
</form>
</body>
</html>
