{% extends 'home.html' %}

{% block content %}
  <h2>Admin Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Signup</button>
  </form>
{% endblock %}

{% comment %} <html>
  <head>
    <style>
      .form-container {
        width: 500px;
        margin: 0 auto;
        padding: 50px;
        text-align: center;
        background-color: #f2f2f2;
        border-radius: 10px;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 12px 20px;
        margin: 8px 0;
        box-sizing: border-box;
        border: 2px solid #ccc;
        border-radius: 4px;
      }
      input[type="submit"] {
        width: 100%;
        background-color: #4CAF50;
        color: white;
        padding: 14px 20px;
        margin: 8px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      input[type="submit"]:hover {
        background-color: #3e8e41;
      }
    </style>
  </head>
  <body>
    {% extends 'base.html'%}
    {%block content%}
    <div class="form-container">
      <form action=" " method='post'>
        {% csrf_token %}
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username"><br>
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>
        <input type="submit" value="admin_login"></input>
      </form> 
      {% endblock content%}
    </div>
  </body>
</html> {% endcomment %}
